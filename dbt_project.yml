name: claims_analytics
version: 1.0.0
config-version: 2

profile: claims_profile
model-paths: ["models"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

models:
  claims_analytics:
    staging:
      +schema: staging
      +materialized: view
    marts:
      +schema: analytics
      +materialized: table
      
  bfs_dw:

    staging:
      +schema: staging
      +materialized: view
    
    staging_core_banking:
      +schema: staging_cb
      +materialized: view    

    staging_payments:
      +schema: staging_payments
      +materialized: view   

    staging_crm:
      +schema: staging_crm
      +materialized: view   
    
    staging_crm:
      +schema: staging_crm
      +materialized: view   

    staging_crm:
      +schema: staging_crm
      +materialized: view   

    marts:
      +schema: analytics
      +materialized: table

    snapshots:
      +schema: snapshots
      +materialized: view   
     
    bfs_dw:
      +schema: bfs_dw
      +materialized: view  

    risk:
      +schema: risk
      +materialized: table

    operations:
      +schema: operations
      +materialized: table
     
    reporting:
      +schema: reporting
      +materialized: table
     
    intermediate:
      +schema: intermediate
      +materialized: table
    
    seeds:
      +schema: dw_raw
      +materialized: table

    vars:
      balances_lookback_days: 14
  
target-path: "target"  
clean-targets:         
  - "target"
  - "dbt_packages"
