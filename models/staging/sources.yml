# select * from {{ source('core', 'claims') }}
# select * from {{ source('core', 'policies') }}
# select * from {{ source('core', 'products') }}
# select * from {{ source('core', 'customers') }}
# select * from {{ source('core', 'accounts') }}
# select * from {{ source('core', 'transactions') }}
# select * from {{ source('core', 'calendar') }}
