version: 2

models:
  - name: fct_claim_reserve_snapshots
    description: "Daily reserve snapshots per claim, date, and reserve type."
    config:
      tags: ["fact", "claims", "reserves"]
    columns:
      - name: claim_reserve_sk
        description: "Surrogate key over (claim_id, snapshot_date, reserve_type)."
        tests: [unique, not_null]

      - name: claim_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_claim')
              field: claim_id

      # Prefer policy_sk if available; else policy_id relationship is still valuable
      - name: policy_id
        tests:
          - relationships:
              to: ref('dim_policy')
              field: policy_id

      - name: snapshot_date
        tests:
          - not_null
          - relationships:
              to: ref('dim_calendar')
              field: date_day

      - name: reserve_type
        tests:
          - not_null
          - relationships:
              to: ref('dim_reserve_type')
              field: reserve_type

      - name: reserve_amount
        tests:
          - not_null

    tests:
      # Ensure the *grain* is enforced at the base table level
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["claim_id", "snapshot_date", "reserve_type"]

      # Optional: detect impossible negative reserves if not allowed
      - dbt_utils.expression_is_true:
          expression: "reserve_amount >= 0"

  - name: fct_account_balance_daily
    description: "Daily account balances per account_id and date."
    config:
      tags: ["fact", "accounts", "balances"]
    columns:
      - name: account_balance_sk
        tests: [unique, not_null]

      - name: account_id
        tests:
          - not_null

      - name: balance_date
        tests:
          - not_null
          - relationships:
              to: ref('dim_calendar')
              field: date_day

      - name: currency_code
        tests:
          - not_null

      - name: opening_balance
        tests:
          - not_null

      - name: closing_balance
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: ["account_id", "balance_date"]

      # Optional sanity: closing balance must be >= 0 if business rule applies
      # - dbt_utils.expression_is_true:
      #     expression: "closing_balance >= 0"
